services:
  - type: web
    name: sales-support-agent
    runtime: python
    plan: starter
    autoDeploy: true
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn sales_support_agent.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.11"
      - key: CLICKUP_API_TOKEN
        sync: false
      - key: CLICKUP_API_KEY
        sync: false
      - key: CLICKUP_LIST_ID
        sync: false
      - key: SALES_AGENT_INTERNAL_API_KEY
        sync: false
      - key: SLACK_BOT_TOKEN
        sync: false
      - key: SLACK_CHANNEL_ID
        sync: false
      - key: SLACK_AE_MAP_JSON
        sync: false
      - key: INSTANTLY_WEBHOOK_SECRET
        sync: false
      - key: INSTANTLY_WEBHOOK_SECRET_HEADER
        value: X-Instantly-Webhook-Secret
      - key: INSTANTLY_WEBHOOK_ALLOWED_EVENT_TYPES
        value: email_sent,reply_received,lead_meeting_booked,lead_meeting_completed,lead_interested,lead_not_interested,lead_neutral
      - key: CLICKUP_DISCOVERY_SAMPLE_SIZE
        value: "10"
      - key: CLICKUP_DISCOVERY_SNAPSHOT_PATH
        value: runtime/clickup_schema_snapshot.json
      - key: CLICKUP_USE_DUE_DATE_FOR_FOLLOW_UP
        value: "false"
      - key: STALE_LEAD_SCAN_MAX_TASKS
        value: "150"
      - key: SALES_AGENT_DB_URL
        sync: false
      - key: HR_PII_SECRET
        sync: false
      - key: FULFILLMENT_CS_REPORTS_DIR
        sync: false
      - key: HUBSPOT_API_TOKEN
        sync: false
      - key: HUBSPOT_PORTAL_ID
        sync: false
      - key: HUBSPOT_SALES_PIPELINE_ID
        sync: false
      - key: HUBSPOT_DEFAULT_OWNER_ID
        sync: false
      - key: HUBSPOT_DEFAULT_SERVICE_LINE
        value: fulfillment
      - key: HUBSPOT_DEFAULT_LEAD_SOURCE_DETAIL
        value: agent
      - key: GOOGLE_SHEETS_SPREADSHEET_ID
        sync: false
      - key: GOOGLE_SHEETS_SALES_RANGE
        sync: false
      - key: GOOGLE_SERVICE_ACCOUNT_JSON
        sync: false
      - key: WEBSITE_OPS_EXECUTE_APPROVED
        value: "true"
      - key: CANVA_CLIENT_ID
        sync: false
      - key: CANVA_CLIENT_SECRET
        sync: false
      - key: CANVA_REDIRECT_URI
        sync: false
      - key: CANVA_BRAND_TEMPLATE_ID
        sync: false
      - key: CANVA_TOKEN_SECRET
        sync: false
      - key: PLAID_CLIENT_ID
        sync: false
      - key: PLAID_SECRET
        sync: false
      - key: PLAID_ENV
        value: production
      - key: PLAID_TOKEN_SECRET
        sync: false
      - key: PLAID_WEBHOOK_URL
        value: https://agent.anatainc.com/api/integrations/plaid/webhook
      - key: PLAID_REDIRECT_URI
        value: https://agent.anatainc.com/admin/finances/plaid/oauth-return

  - type: cron
    name: sales-support-stale-scan
    runtime: python
    schedule: "0 15 * * 1-5"
    buildCommand: pip install -r requirements.txt
    startCommand: |
      curl -sS -X POST "$SALES_SUPPORT_AGENT_URL/api/jobs/stale-leads/run" \
        -H "Content-Type: application/json" \
        -H "X-Internal-Api-Key: $SALES_AGENT_INTERNAL_API_KEY" \
        -d '{"dry_run":false}'
    envVars:
      - key: SALES_SUPPORT_AGENT_URL
        sync: false
      - key: SALES_AGENT_INTERNAL_API_KEY
        sync: false

  - type: cron
    name: sales-support-gmail-sync
    runtime: python
    schedule: "*/15 * * * *"
    buildCommand: pip install -r requirements.txt
    startCommand: |
      curl -sS -X POST "$SALES_SUPPORT_AGENT_URL/api/jobs/gmail-sync/run" \
        -H "Content-Type: application/json" \
        -H "X-Internal-Api-Key: $SALES_AGENT_INTERNAL_API_KEY" \
        -d '{"dry_run":false}'
    envVars:
      - key: SALES_SUPPORT_AGENT_URL
        sync: false
      - key: SALES_AGENT_INTERNAL_API_KEY
        sync: false

  - type: cron
    name: sales-support-operator-review
    runtime: python
    schedule: "5 * * * *"
    buildCommand: pip install -r requirements.txt
    startCommand: |
      curl -sS -X POST "$SALES_SUPPORT_AGENT_URL/api/jobs/sales-operator/run" \
        -H "Content-Type: application/json" \
        -H "X-Internal-Api-Key: $SALES_AGENT_INTERNAL_API_KEY" \
        -d '{"dry_run":false,"limit":25,"run_hubspot_sync":true,"run_mailbox_sync":false,"trigger":"scheduled"}'
    envVars:
      - key: SALES_SUPPORT_AGENT_URL
        sync: false
      - key: SALES_AGENT_INTERNAL_API_KEY
        sync: false
