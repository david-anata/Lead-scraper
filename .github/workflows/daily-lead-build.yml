name: Daily Lead Build

on:
  schedule:
    - cron: "30 12 * * 1-5"
  workflow_dispatch:

concurrency:
  group: daily-lead-build
  cancel-in-progress: false

jobs:
  run-lead-build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      MAX_DOMAINS: "150"
    steps:
      - name: Validate configuration
        env:
          LEAD_BUILD_URL: ${{ secrets.LEAD_BUILD_URL }}
        run: |
          CLEAN_URL=$(printf '%s' "$LEAD_BUILD_URL" | tr -d '\r\n' | sed 's/^["'\'']//; s/["'\'']$//' | sed 's:/*$::')

          if [ -z "$CLEAN_URL" ]; then
            echo "LEAD_BUILD_URL secret is required."
            exit 1
          fi

          case "$CLEAN_URL" in
            http://*|https://*)
              ;;
            *)
              echo "LEAD_BUILD_URL must start with http:// or https://"
              exit 1
              ;;
          esac

      - name: Build run payload
        run: |
          echo "RUN_DATE=$(TZ=America/Denver date +%F)" >> "$GITHUB_ENV"

      - name: Trigger FastAPI lead build
        env:
          LEAD_BUILD_URL: ${{ secrets.LEAD_BUILD_URL }}
        run: |
          BASE_URL=$(printf '%s' "$LEAD_BUILD_URL" | tr -d '\r\n' | sed 's/^["'\'']//; s/["'\'']$//' | sed 's:/*$::')
          PAYLOAD=$(printf '{"date":"%s","max_domains":%s}' "$RUN_DATE" "$MAX_DOMAINS")

          HTTP_STATUS=$(curl -sS \
            -o response.json \
            -w "%{http_code}" \
            -X POST "${BASE_URL}/run-lead-build?scheduler_source=github_actions" \
            -H "Content-Type: application/json" \
            -H "X-Scheduler-Source: github_actions" \
            -d "$PAYLOAD")

          cat response.json

          if [ "$HTTP_STATUS" -lt 200 ] || [ "$HTTP_STATUS" -ge 300 ]; then
            echo "Lead build failed with HTTP status $HTTP_STATUS"
            exit 1
          fi
